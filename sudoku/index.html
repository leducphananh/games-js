<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sudoku</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>Sudoku</h1>
        <div class="sub">HTML • CSS • JS</div>
      </div>

      <div class="status">
        <div class="pill">
          <span id="difficultyLabel">Difficulty: Medium</span>
        </div>
        <div class="pill"><span id="timer">00:00</span></div>
      </div>
    </header>

    <main class="layout">
      <section class="boardWrap">
        <div
          id="board"
          class="board"
          aria-label="Sudoku board"
          role="grid"
        ></div>

        <div class="message" id="message" aria-live="polite"></div>
      </section>

      <aside class="panel">
        <div class="panelBlock">
          <label class="label" for="difficulty">New Game</label>
          <div class="row">
            <select id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
            <button id="newGameBtn" class="primary">New</button>
          </div>
        </div>

        <div class="panelBlock">
          <div class="label">Input</div>
          <div class="row">
            <button
              id="notesToggle"
              class="ghost"
              aria-pressed="false"
              title="Toggle pencil marks (N)"
            >
              Notes: Off
            </button>
            <button
              id="eraseBtn"
              class="ghost"
              title="Erase (Backspace/Delete)"
            >
              Erase
            </button>
          </div>

          <div class="digits" id="digits" aria-label="Digit keypad"></div>
        </div>

        <div class="panelBlock">
          <div class="label">Tools</div>
          <div class="col">
            <button id="checkBtn" class="ghost">Check</button>
            <button id="hintBtn" class="ghost">Hint</button>
            <button id="solveBtn" class="danger">Reveal Solution</button>
            <button id="resetBtn" class="ghost">Reset to Start</button>
          </div>
        </div>

        <div class="panelBlock help">
          <div class="label">Shortcuts</div>
          <ul>
            <li>Arrow keys: move</li>
            <li>1–9: enter digit</li>
            <li>Backspace/Delete: erase</li>
            <li>N: toggle notes</li>
            <li>Esc: clear selection</li>
          </ul>
        </div>
      </aside>
    </main>

    <footer class="footer">
      <span>Tip: use Notes mode for pencil marks.</span>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
